<script>

function initPageSearch() {
    const searchInput = document.querySelector('.search-form input');
    const searchButton = document.querySelector('.search-form button');
    
    if (!searchInput) return;
    
    // Liste des pages du site
    const pages = [
        { name: "home", url: "index.html", aliases: ["accueil", "main", "index"] },
        { name: "about", url: "about.html", aliases: ["apropos", "à propos", "qui", "who"] },
        { name: "portfolio", url: "portfolio.html", aliases: ["projets", "projects", "travaux", "work"] },
        { name: "resume", url: "resume.html", aliases: ["cv", "curriculum", "parcours"] },
        { name: "skills", url: "skills.html", aliases: ["compétences", "competences", "techniques"] },
        { name: "contact", url: "contact.html", aliases: ["me contacter", "email", "joindre"] }
    ];
    
    function goToPage(searchTerm) {
        const term = searchTerm.toLowerCase().trim();
        if (term === "") return false;

        for (let page of pages) {
            //Verify iif the term is exactly the page name
            if (page.name === term) {
                window.location.href = page.url;
                return true;
            }
            for (let alias of page.aliases) {
                if (term === alias || term.includes(alias)) {
                    window.location.href = page.url;
                    return true;
                }
            }
            //Verify if the term is inclued in the page name
            if (page.name.includes(term)) {
                window.location.href = page.url;
                return true;
            }
        }
        
        //if nothing found
        alert(`❌ Page "${searchTerm}" non trouvée.\n\n📄 Pages disponibles :\n- Home\n- About\n- Portfolio\n- Resume\n- Skills\n- Contact`);
        return false;
    }

    if (searchButton) {
        searchButton.addEventListener('click', (e) => {
            e.preventDefault();
            goToPage(searchInput.value);
        });
    }
    
    //Search when pressing enter
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            goToPage(searchInput.value);
        }
    });
}
document.addEventListener('DOMContentLoaded', initPageSearch);
</script>
